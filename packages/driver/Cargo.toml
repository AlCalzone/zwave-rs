[package]
name = "zwave-driver"
version = "0.1.0"
rust-version.workspace = true
edition.workspace = true

[features]
default = ["std"]
std = ["zwave-core/std", "zwave-cc/std", "zwave-serial/std", "zwave-logging/std", "zwave-pal/std"]
embassy = ["zwave-core/embassy", "zwave-cc/embassy", "zwave-serial/embassy", "zwave-logging/embassy", "zwave-pal/embassy"]

[dependencies]
paste.workspace = true
proc-macros.workspace = true
thiserror.workspace = true
typed-builder.workspace = true
zwave-cc = { workspace = true, default-features = false }
zwave-core = { workspace = true, default-features = false }
zwave-logging = { workspace = true, default-features = false }
zwave-pal.workspace = true
zwave-serial = { workspace = true, default-features = false }
