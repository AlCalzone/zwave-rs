[package]
name = "zwave-driver"
version = "0.1.0"
rust-version.workspace = true
edition.workspace = true

[features]
default = ["std"]
std = ["zwave-core/std", "zwave-cc/std", "zwave-serial/std", "zwave-logging/std", "zwave-pal/std", "petgraph"]
embassy = ["zwave-core/embassy", "zwave-logging/embassy", "zwave-pal/embassy"]

[dependencies]
paste.workspace = true
petgraph = { workspace = true, optional = true }
proc-macros.workspace = true
thiserror.workspace = true
typed-builder.workspace = true
zwave-cc.workspace = true
zwave-core.workspace = true
zwave-logging.workspace = true
zwave-pal.workspace = true
zwave-serial.workspace = true
